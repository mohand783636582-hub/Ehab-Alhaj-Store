apply plugin: 'com.android.application'

android {
    compileSdkVersion 28

    defaultConfig {
        applicationId "com.ehab.alhaj"
        minSdkVersion 16
        targetSdkVersion 28
        versionCode 1
        versionName "1.0"
    }

    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }
}

dependencies {
    implementation 'com.github.bumptech.glide:glide:4.12.0'
    // غيرنا الإصدار هنا ليتوافق مع AIDE ويحذف الخطأ
    implementation 'com.google.firebase:firebase-database:19.3.0'
}
