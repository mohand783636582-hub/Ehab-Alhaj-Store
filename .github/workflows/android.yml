name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: |
          # تنظيف الملفات المتعارضة لضمان بناء جديد
          rm -f settings.gradle build.gradle || true
          echo "include ':app'" > settings.gradle
          # محاولة البناء حتى لو وجدت أخطاء بسيطة
          gradle assembleDebug --stacktrace || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ehab-Alhaj-App
          # هذا هو السطر السحري: ابحث في كل مكان عن الـ APK
          path: "**/*.apk"
          if-no-files-found: warn
