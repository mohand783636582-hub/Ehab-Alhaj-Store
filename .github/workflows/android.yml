name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Setup Project Structure
        run: |
          mkdir -p app/src/main/java/com/ehab/alhaj
          mkdir -p app/src/main/res/layout
          cp MainActivity.java app/src/main/java/com/ehab/alhaj/ || true
          cp AndroidManifest.xml app/src/main/ || true
          cp build.gradle app/ || true
      - name: Build with Gradle
        run: gradle assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Ehab-Alhaj-App
          path: "**/*.apk"
