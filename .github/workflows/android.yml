name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
          # مسح أي إعدادات قديمة مسببة للمشاكل
          rm -f settings.gradle build.gradle || true
          # إنشاء إعدادات جديدة تربط مجلد app الخاص بك
          echo "include ':app'" > settings.gradle
          # تشغيل البناء مباشرة
          gradle assembleDebug --stacktrace || echo "فشل البناء ولكن سنحاول الرفع"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ehab-Alhaj-App
          path: "**/*.apk"
